name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run the standard CI test stack weekly to catch regressions
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  compatibility-smoke:
    name: Compatibility Smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --locked

    - name: Run compatibility smoke tests
      run: |
        uv run pytest tests/ \
          -m smoke \
          --tb=short \
          --maxfail=10 \
          --timeout=10 \
          -q

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-compat-${{ matrix.python-version }}
        path: .pytest_cache/

  serial-primary:
    name: Primary Serial Gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --locked

    - name: Run primary serial suite
      run: |
        uv run pytest tests/ \
          --tb=short \
          --maxfail=1 \
          -q

  parallel-isolation:
    name: Parallel Isolation Check
    runs-on: ubuntu-latest
    needs: [serial-primary, compatibility-smoke]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --locked

    - name: Run parallel isolation suite
      run: |
        uv run pytest tests/ \
          -n auto \
          --dist=loadgroup \
          --tb=short \
          --maxfail=1 \
          -q

  coverage-tests:
    name: Coverage Report (Main Only)
    runs-on: ubuntu-latest
    needs: parallel-isolation
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils libxkbcommon-x11-0

    - name: Install Python dependencies
      run: uv sync --locked

    - name: Run coverage suite with xvfb
      run: |
        xvfb-run -a uv run pytest tests/ \
          -m "not performance and not legacy" \
          -n auto \
          --dist=loadgroup \
          --tb=short \
          --cov=. \
          --cov-report=xml

    - name: Generate coverage report (already done above)
      if: success()
      run: echo "Coverage already generated with --cov-report=xml"

    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
