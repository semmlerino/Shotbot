name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run performance tests weekly on Sunday at 2 AM
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  fast-tests:
    name: Fast Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --locked

    - name: Run fast tests
      run: |
        uv run pytest tests/ \
          -m "not slow and not performance and not stress and not legacy and not performance_like and not tutorial" \
          --tb=short \
          --maxfail=10 \
          --timeout=10 \
          -n auto \
          --dist=loadgroup \
          -q

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-fast-${{ matrix.python-version }}
        path: .pytest_cache/

  full-tests:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: fast-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb x11-utils libxkbcommon-x11-0

    - name: Install Python dependencies
      run: uv sync --locked

    - name: Run full test suite with xvfb
      run: |
        xvfb-run -a uv run pytest tests/ \
          -m "not performance and not stress and not legacy and not performance_like and not tutorial" \
          -n auto \
          --tb=short \
          --cov=. \
          --cov-report=xml

    - name: Generate coverage report (already done above)
      if: success()
      run: echo "Coverage already generated with --cov-report=xml"

    - name: Upload coverage to Codecov
      if: success()
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event.schedule || github.event_name == 'workflow_dispatch'

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --locked

    - name: Run performance tests
      run: |
        uv run pytest tests/performance/ \
          -m "performance" \
          --benchmark-only \
          --benchmark-json=benchmark.json

    - name: Store benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
