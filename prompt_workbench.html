<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Workbench</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-2: #1c2129;
    --border: #30363d;
    --border-focus: #58a6ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent: #58a6ff;
    --accent-subtle: #1f6feb22;
    --green: #3fb950;
    --green-subtle: #23863622;
    --yellow: #d29922;
    --yellow-subtle: #9e6a0322;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: auto 1fr;
    height: 100vh;
  }

  /* Header */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .stats {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 12px;
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .sidebar-search {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .sidebar-search input {
    width: 100%;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }

  .sidebar-search input:focus {
    border-color: var(--border-focus);
  }

  .filter-row {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-btn {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--accent-subtle); border-color: var(--accent); color: var(--accent); }

  .prompt-list {
    flex: 1;
    overflow-y: auto;
  }

  .category-header {
    padding: 8px 12px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    position: sticky;
    top: 0;
    background: var(--surface);
  }

  .prompt-item {
    padding: 8px 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.1s;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .prompt-item:hover { background: var(--surface-2); }
  .prompt-item.active { background: var(--accent-subtle); border-left-color: var(--accent); }

  .prompt-item-content { flex: 1; min-width: 0; }

  .prompt-item-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .prompt-item-meta {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 2px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }

  .status-dot.untested { background: var(--text-dim); }
  .status-dot.testing { background: var(--yellow); }
  .status-dot.useful { background: var(--green); }
  .status-dot.needs-work { background: var(--orange); }
  .status-dot.skip { background: var(--red); }

  .tag {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* Main content */
  .main {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  .prompt-view {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .prompt-header {
    padding: 20px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .prompt-header h2 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .prompt-header-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .prompt-body-area {
    flex: 1;
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  .prompt-content-scroll {
    overflow-y: auto;
    padding: 20px 32px;
  }

  .prompt-text {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
  }

  .prompt-text.editing {
    display: none;
  }

  .prompt-edit-area {
    display: none;
    width: 100%;
    min-height: 300px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border-focus);
    border-radius: 8px;
    padding: 20px;
    resize: vertical;
    outline: none;
  }

  .prompt-edit-area.active {
    display: block;
  }

  /* Notes panel */
  .notes-panel {
    border-top: 1px solid var(--border);
    padding: 16px 32px;
    background: var(--surface);
  }

  .notes-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .notes-panel-header h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
  }

  .notes-textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
    outline: none;
  }

  .notes-textarea:focus {
    border-color: var(--border-focus);
  }

  .status-controls {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-top: 10px;
  }

  .status-controls label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .status-btn {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .status-btn:hover { border-color: var(--text-muted); }
  .status-btn.active-untested { background: var(--surface-2); color: var(--text); border-color: var(--text-dim); }
  .status-btn.active-testing { background: var(--yellow-subtle); color: var(--yellow); border-color: var(--yellow); }
  .status-btn.active-useful { background: var(--green-subtle); color: var(--green); border-color: var(--green); }
  .status-btn.active-needs-work { background: #d1861622; color: var(--orange); border-color: var(--orange); }
  .status-btn.active-skip { background: #f8514922; color: var(--red); border-color: var(--red); }

  .rating-controls {
    display: flex;
    gap: 4px;
    align-items: center;
    margin-top: 8px;
  }

  .rating-controls label {
    font-size: 12px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .star {
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dim);
    transition: color 0.1s;
    background: none;
    border: none;
    padding: 0 1px;
  }

  .star.filled { color: var(--yellow); }
  .star:hover { color: var(--yellow); }

  /* Buttons */
  .btn {
    padding: 5px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .btn:hover { background: var(--border); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 3px 10px; font-size: 11px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--green);
    border-radius: 8px;
    font-size: 13px;
    color: var(--green);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Import/Export modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #00000088;
    z-index: 50;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: min(560px, 90vw);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal h3 { font-size: 16px; font-weight: 600; }

  .modal textarea {
    width: 100%;
    min-height: 200px;
    padding: 12px;
    font-family: monospace;
    font-size: 12px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    resize: vertical;
    outline: none;
  }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Compose view */
  .compose-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .compose-section h4 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .compose-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .compose-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
  }

  .compose-tag:hover { border-color: var(--purple); color: var(--purple); }
  .compose-tag.selected { background: #bc8cff22; border-color: var(--purple); color: var(--purple); }

  .priority-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
  }

  .priority-high { background: var(--green-subtle); color: var(--green); border: 1px solid var(--green); }
  .priority-med { background: var(--yellow-subtle); color: var(--yellow); border: 1px solid var(--yellow); }
  .priority-low { background: var(--surface-2); color: var(--text-dim); border: 1px solid var(--border); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>Prompt Workbench</h1>
    <div class="header-actions">
      <span class="stats" id="stats"></span>
      <button class="btn btn-sm" onclick="showCompose()" title="Compose multiple prompts together">Compose</button>
      <button class="btn btn-sm" onclick="exportData()">Export</button>
      <button class="btn btn-sm" onclick="showImport()">Import</button>
      <button class="btn btn-sm" onclick="addCustomPrompt()">+ Custom</button>
      <button class="btn btn-sm" onclick="showHelp()">?</button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="Search prompts..." oninput="filterPrompts()">
    </div>
    <div class="filter-row" id="status-filters"></div>
    <div class="filter-row" id="category-filters"></div>
    <div class="prompt-list" id="prompt-list"></div>
  </aside>

  <main class="main" id="main">
    <div class="empty-state" style="flex-direction:column;gap:16px;text-align:left;max-width:520px;padding:32px">
      <div style="font-size:16px;font-weight:600;color:var(--text)">Prompt Workbench</div>
      <div style="font-size:13px;color:var(--text-muted);line-height:1.7">
        Select a prompt from the sidebar to view, edit, test, and annotate it.<br><br>
        <strong style="color:var(--text)">Adding prompts:</strong>
        Prompts are loaded from <code style="background:var(--surface);padding:2px 6px;border-radius:4px;font-size:12px">prompts.json</code>
        next to this file. To add prompts via an LLM, point it at that file &mdash;
        the <code style="background:var(--surface);padding:2px 6px;border-radius:4px;font-size:12px">_meta</code>
        object documents the schema. Click <strong style="color:var(--text)">?</strong> for full details.
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="event.target===this && closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
let PROMPTS = [];

// State
let state = {
  selected: null,
  filter: { search: '', status: 'all', category: 'all' },
  composing: false,
  composeSet: new Set(),
  editing: false
};

function loadUserData() {
  try {
    return JSON.parse(localStorage.getItem('prompt-workbench') || '{}');
  } catch { return {}; }
}

function saveUserData(data) {
  localStorage.setItem('prompt-workbench', JSON.stringify(data));
}

function getUserPromptData(id) {
  const data = loadUserData();
  return data[id] || { status: 'untested', rating: 0, notes: '', customBody: null };
}

function setUserPromptData(id, updates) {
  const data = loadUserData();
  data[id] = { ...getUserPromptData(id), ...updates };
  saveUserData(data);
}

function getCustomPrompts() {
  try {
    return JSON.parse(localStorage.getItem('prompt-workbench-custom') || '[]');
  } catch { return []; }
}

function saveCustomPrompts(prompts) {
  localStorage.setItem('prompt-workbench-custom', JSON.stringify(prompts));
}

function getAllPrompts() {
  return [...PROMPTS, ...getCustomPrompts()];
}

// Rendering
function getCategories() {
  return [...new Set(getAllPrompts().map(p => p.category))];
}

function renderStatusFilters() {
  const statuses = ['all', 'untested', 'testing', 'useful', 'needs-work', 'skip'];
  const el = document.getElementById('status-filters');
  el.innerHTML = statuses.map(s =>
    `<button class="filter-btn ${state.filter.status === s ? 'active' : ''}"
            onclick="setStatusFilter('${s}')">${s === 'all' ? 'All' : s.replace('-', ' ')}</button>`
  ).join('');
}

function renderCategoryFilters() {
  const cats = ['all', ...getCategories()];
  const el = document.getElementById('category-filters');
  el.innerHTML = cats.map(c => {
    const label = c === 'all' ? 'All' : c.split(' ')[0];
    return `<button class="filter-btn ${state.filter.category === c ? 'active' : ''}"
              onclick="setCategoryFilter('${c}')">${label}</button>`;
  }).join('');
}

function renderPromptList() {
  const prompts = getFilteredPrompts();
  const el = document.getElementById('prompt-list');
  const byCategory = {};

  prompts.forEach(p => {
    if (!byCategory[p.category]) byCategory[p.category] = [];
    byCategory[p.category].push(p);
  });

  let html = '';
  for (const [cat, items] of Object.entries(byCategory)) {
    html += `<div class="category-header">${cat}</div>`;
    items.forEach(p => {
      const ud = getUserPromptData(p.id);
      const active = state.selected === p.id ? 'active' : '';
      const priorityClass = p.priority === 'high' ? 'priority-high' : p.priority === 'med' ? 'priority-med' : 'priority-low';
      html += `
        <div class="prompt-item ${active}" onclick="selectPrompt(${JSON.stringify(p.id)})">
          <span class="status-dot ${ud.status}"></span>
          <div class="prompt-item-content">
            <div class="prompt-item-title">${p.title}</div>
            <div class="prompt-item-meta">
              <span class="priority-badge ${priorityClass}">${p.priority}</span>
              ${ud.rating > 0 ? `<span class="tag">${'\u2605'.repeat(ud.rating)}</span>` : ''}
              ${String(p.id).startsWith('custom-') ? '<span class="tag">custom</span>' : ''}
            </div>
          </div>
        </div>`;
    });
  }

  el.innerHTML = html || '<div style="padding:20px;color:var(--text-dim);font-size:13px;">No prompts match filters</div>';
  updateStats();
}

function getFilteredPrompts() {
  return getAllPrompts().filter(p => {
    const ud = getUserPromptData(p.id);
    if (state.filter.status !== 'all' && ud.status !== state.filter.status) return false;
    if (state.filter.category !== 'all' && p.category !== state.filter.category) return false;
    if (state.filter.search) {
      const q = state.filter.search.toLowerCase();
      const body = ud.customBody || p.body;
      if (!p.title.toLowerCase().includes(q) && !body.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderPromptView(id) {
  const p = getAllPrompts().find(pp => pp.id === id);
  if (!p) return;

  const ud = getUserPromptData(id);
  const body = ud.customBody || p.body;
  const main = document.getElementById('main');
  const composeParts = (p.composesWell || []).map(cid => getAllPrompts().find(pp => pp.id === cid)).filter(Boolean);

  main.innerHTML = `
    <div class="prompt-view">
      <div class="prompt-header">
        <div>
          <h2>${p.title}</h2>
          <span style="font-size:12px;color:var(--text-muted)">${p.category}</span>
        </div>
        <div class="prompt-header-actions">
          <button class="btn btn-sm" onclick="toggleEdit()" id="edit-btn">Edit</button>
          <button class="btn btn-sm" onclick="resetPrompt(${JSON.stringify(id)})">Reset</button>
          <button class="btn btn-primary btn-sm" onclick="copyPrompt(${JSON.stringify(id)})">Copy</button>
        </div>
      </div>
      <div class="prompt-body-area">
        <div class="prompt-content-scroll">
          <pre class="prompt-text" id="prompt-display">${escapeHtml(body)}</pre>
          <textarea class="prompt-edit-area" id="prompt-editor"
                    onblur="saveEdit(${JSON.stringify(id)})">${escapeHtml(body)}</textarea>
          ${composeParts.length > 0 ? `
          <div class="compose-section">
            <h4>Composes well with</h4>
            <div class="compose-tags">
              ${composeParts.map(cp => `<span class="compose-tag ${state.composeSet.has(cp.id) ? 'selected' : ''}"
                onclick="toggleCompose(${JSON.stringify(cp.id)})">${cp.title}</span>`).join('')}
            </div>
          </div>` : ''}
        </div>
        <div class="notes-panel">
          <div class="notes-panel-header"><h3>Notes</h3></div>
          <textarea class="notes-textarea" placeholder="Testing notes, observations, ideas..."
                    oninput="saveNotes(${JSON.stringify(id)}, this.value)">${escapeHtml(ud.notes)}</textarea>
          <div class="status-controls">
            <label>Status:</label>
            ${['untested','testing','useful','needs-work','skip'].map(s =>
              `<button class="status-btn ${ud.status === s ? 'active-' + s : ''}"
                      onclick="setStatus(${JSON.stringify(id)}, '${s}')">${s.replace('-', ' ')}</button>`
            ).join('')}
          </div>
          <div class="rating-controls">
            <label>Quality:</label>
            ${[1,2,3,4,5].map(n =>
              `<button class="star ${n <= ud.rating ? 'filled' : ''}"
                      onclick="setRating(${JSON.stringify(id)}, ${n})">\u2605</button>`
            ).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function updateStats() {
  const all = getAllPrompts();
  const data = loadUserData();
  const tested = all.filter(p => {
    const d = data[p.id];
    return d && d.status !== 'untested';
  }).length;
  const useful = all.filter(p => {
    const d = data[p.id];
    return d && d.status === 'useful';
  }).length;
  document.getElementById('stats').textContent = `${tested}/${all.length} tested \u00b7 ${useful} useful`;
}

// Actions
function selectPrompt(id) {
  state.selected = id;
  state.editing = false;
  renderPromptList();
  renderPromptView(id);
}

function setStatusFilter(s) {
  state.filter.status = s;
  renderStatusFilters();
  renderPromptList();
}

function setCategoryFilter(c) {
  state.filter.category = c;
  renderCategoryFilters();
  renderPromptList();
}

function filterPrompts() {
  state.filter.search = document.getElementById('search').value;
  renderPromptList();
}

function setStatus(id, status) {
  setUserPromptData(id, { status });
  renderPromptList();
  renderPromptView(id);
}

function setRating(id, rating) {
  const ud = getUserPromptData(id);
  setUserPromptData(id, { rating: ud.rating === rating ? 0 : rating });
  renderPromptList();
  renderPromptView(id);
}

function saveNotes(id, notes) {
  setUserPromptData(id, { notes });
}

function toggleEdit() {
  state.editing = !state.editing;
  const display = document.getElementById('prompt-display');
  const editor = document.getElementById('prompt-editor');
  const btn = document.getElementById('edit-btn');

  if (state.editing) {
    display.classList.add('editing');
    editor.classList.add('active');
    editor.focus();
    btn.textContent = 'Done';
  } else {
    display.classList.remove('editing');
    editor.classList.remove('active');
    btn.textContent = 'Edit';
    if (state.selected != null) saveEdit(state.selected);
  }
}

function saveEdit(id) {
  const editor = document.getElementById('prompt-editor');
  if (!editor) return;
  const original = getAllPrompts().find(p => p.id === id);
  if (!original) return;
  const val = editor.value;
  if (val !== original.body) {
    setUserPromptData(id, { customBody: val });
  }
  const display = document.getElementById('prompt-display');
  if (display) display.textContent = val;
}

function resetPrompt(id) {
  setUserPromptData(id, { customBody: null });
  renderPromptView(id);
}

function copyPrompt(id) {
  const ud = getUserPromptData(id);
  const p = getAllPrompts().find(pp => pp.id === id);
  const text = ud.customBody || p.body;

  let fullText = text;
  if (state.composeSet.size > 0) {
    const parts = [...state.composeSet].map(cid => {
      const cp = getAllPrompts().find(pp => pp.id === cid);
      const cud = getUserPromptData(cid);
      return `---\n\n## ${cp.title}\n\n${cud.customBody || cp.body}`;
    });
    fullText = text + '\n\n' + parts.join('\n\n');
  }

  navigator.clipboard.writeText(fullText).then(() => toast('Copied to clipboard'));
}

function toggleCompose(id) {
  if (state.composeSet.has(id)) state.composeSet.delete(id);
  else state.composeSet.add(id);
  if (state.selected != null) renderPromptView(state.selected);
}

function showCompose() {
  state.composing = !state.composing;
  if (state.composing) {
    const modal = document.getElementById('modal');
    const all = getAllPrompts();
    modal.innerHTML = `
      <h3>Compose Prompts</h3>
      <p style="font-size:13px;color:var(--text-muted)">Select prompts to combine into a single clipboard copy. Click the currently selected prompt's Copy button when ready.</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:300px;overflow-y:auto;padding:8px 0">
        ${all.map(p => `
          <button class="compose-tag ${state.composeSet.has(p.id) ? 'selected' : ''}"
                  onclick="toggleCompose(${JSON.stringify(p.id)});showCompose()">
            ${p.title}
          </button>`).join('')}
      </div>
      <div class="modal-actions">
        <button class="btn btn-sm" onclick="state.composeSet.clear();closeModal();if(state.selected!=null)renderPromptView(state.selected)">Clear</button>
        <button class="btn btn-primary btn-sm" onclick="closeModal()">Done (${state.composeSet.size} selected)</button>
      </div>`;
    document.getElementById('modal-overlay').classList.add('show');
  } else {
    closeModal();
  }
}

function addCustomPrompt() {
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3>Add Custom Prompt</h3>
    <input type="text" id="custom-title" placeholder="Prompt title" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
    <select id="custom-category" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
      ${getCategories().map(c => `<option value="${c}">${c}</option>`).join('')}
      <option value="__new">+ New category...</option>
    </select>
    <textarea id="custom-body" placeholder="Prompt body..." style="width:100%;min-height:200px;padding:12px;font-family:monospace;font-size:12px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:6px;resize:vertical"></textarea>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveCustomPrompt()">Add</button>
    </div>`;
  document.getElementById('custom-category').addEventListener('change', function() {
    if (this.value === '__new') {
      const name = prompt('Category name:');
      if (name) {
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name; opt.selected = true;
        this.insertBefore(opt, this.lastElementChild);
      } else this.value = getCategories()[0];
    }
  });
  document.getElementById('modal-overlay').classList.add('show');
  document.getElementById('custom-title').focus();
}

function saveCustomPrompt() {
  const title = document.getElementById('custom-title').value.trim();
  const category = document.getElementById('custom-category').value;
  const body = document.getElementById('custom-body').value.trim();
  if (!title || !body) return toast('Title and body required');

  const customs = getCustomPrompts();
  const id = 'custom-' + Date.now();
  customs.push({ id, title, category, priority: 'med', composesWell: [], body });
  saveCustomPrompts(customs);
  closeModal();
  renderCategoryFilters();
  renderPromptList();
  selectPrompt(id);
  toast('Prompt added');
}

function exportData() {
  const payload = {
    version: 1,
    userData: loadUserData(),
    customPrompts: getCustomPrompts(),
    exportedAt: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prompt-workbench-export.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Exported');
}

        <li><strong>Notes</strong> &mdash; free-text annotations saved per prompt</li>
        <li><strong>Edit</strong> &mdash; modify prompt text (saved separately, Reset restores original)</li>
        <li><strong>Compose</strong> &mdash; select multiple prompts, Copy merges them into one clipboard payload</li>

    <div class="modal-actions">

    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function showImport() {
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3>Import Data</h3>
    <p style="font-size:13px;color:var(--text-muted)">Paste exported JSON. This will merge with existing data (existing notes/ratings preserved unless overwritten).</p>
    <textarea id="import-data" placeholder="Paste JSON here..."></textarea>
    <div class="modal-actions">
      <button class="btn btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="doImport()">Import</button>
    </div>`;
  document.getElementById('modal-overlay').classList.add('show');
}

function doImport() {
  try {
    const raw = document.getElementById('import-data').value;
    const payload = JSON.parse(raw);
    if (payload.userData) {
      const existing = loadUserData();
      saveUserData({ ...existing, ...payload.userData });
    }
    if (payload.customPrompts) {
      const existing = getCustomPrompts();
      const existingIds = new Set(existing.map(p => p.id));
      const merged = [...existing, ...payload.customPrompts.filter(p => !existingIds.has(p.id))];
      saveCustomPrompts(merged);
    }
    closeModal();
    renderCategoryFilters();
    renderPromptList();
    if (state.selected != null) renderPromptView(state.selected);
    toast('Imported');
  } catch (e) {
    toast('Invalid JSON');
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
  state.composing = false;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.editing) toggleEdit();
    else closeModal();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'c' && state.selected != null && !window.getSelection().toString()) {
    e.preventDefault();
    copyPrompt(state.selected);
  }
});

// Init
fetch('./prompts.json')
  .then(r => r.json())
  .then(data => {
    PROMPTS = data.prompts;
    renderStatusFilters();
    renderCategoryFilters();
    renderPromptList();
  })
  .catch(err => {
    document.getElementById('main').innerHTML =
      `<div class="empty-state" style="flex-direction:column;gap:8px">
        <div>Failed to load prompts.json</div>
        <div style="font-size:12px;color:var(--text-dim)">${err.message}</div>
      </div>`;
  });
</script>
</body>
</html>
