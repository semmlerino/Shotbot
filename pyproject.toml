[tool.basedpyright]
include = [
    "*.py",
    "conversion_controller.py",
    "process_monitor.py", 
    "settings_panel.py",
    "main_window_refactored.py",
    "config.py",
    "file_list_widget.py",
    "process_manager.py",
    "progress_tracker.py",
    "codec_helpers.py"
]
exclude = [
    "venv/**",
    "__pycache__/**"
]
ignore = [
    "PyMPEG.py"  # Skip the old monolithic file
]

pythonVersion = "3.12"
venvPath = "venv"
typeCheckingMode = "basic"

reportMissingImports = false
reportMissingTypeStubs = false
reportUnknownMemberType = false
reportUnknownParameterType = false
reportUnknownArgumentType = false
reportUnknownVariableType = false
reportUnannotatedClassAttribute = false