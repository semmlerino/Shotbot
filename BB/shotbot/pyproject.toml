[tool.ruff]
# Same as Black
line-length = 88
indent-width = 4

# Python version
target-version = "py38"

# Exclude common directories
exclude = [
    ".git",
    ".ruff_cache",
    "__pycache__",
    "venv",
    ".venv",
]

[tool.ruff.lint]
# Enable pycodestyle (`E`) and Pyflakes (`F`) codes
select = ["E", "F", "I"]

# Never enforce line length violations
ignore = ["E501"]

# Allow autofix for all enabled rules
fixable = ["ALL"]

[tool.ruff.format]
# Use single quotes for strings
quote-style = "double"

# Indent with spaces
indent-style = "space"

# Respect magic trailing commas
skip-magic-trailing-comma = false

# Format docstrings
docstring-code-format = true