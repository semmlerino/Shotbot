[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    -p no:xvfb
    -p no:xdist
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    gui: GUI tests requiring display
    performance: Performance regression tests
    contract: Contract validation tests
    mutation: Mutation testing
    snapshot: Snapshot testing
    quality: Code quality tests
    stress: Stress tests that may take longer or use more resources

# Disable xvfb plugin completely to prevent WSL hanging
xvfb_width = 1920
xvfb_height = 1080
xvfb_colordepth = 24
xvfb_args = -screen 0 1920x1080x24